<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas de Jogos</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .container{
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    h1{
      margin-bottom:30px;
    }

    a{
      display:block;
      margin:15px 0;
      padding:15px;
      background:#222;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-size:18px;
    }

    a:hover{
      opacity:0.9;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Notas de Jogos</h1>

  <a href="./desktop/">Versão Desktop</a>

  <a href="./mobile/">Versão Mobile</a>
</div>

</body>
</html>
